<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DevScreen Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="auth.js"></script>
    <style>
        .error-msg { color: #ef4444; font-size: 0.85rem; display: none; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in-up">
            <div class="company-branding">
                <div class="company-logo">DS</div>
                <h2>DevScreen</h2>
                <p class="subtitle">Enterprise Portal</p>
            </div>

            <div class="login-tabs">
                <button class="tab-btn active" id="tab-candidate" onclick="switchRole('candidate')">Candidate</button>
                <button class="tab-btn" id="tab-hr" onclick="switchRole('hr')">HR / Admin</button>
            </div>

            <div id="login-form" class="login-form active">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username (user1 or admin)" class="form-input" value="user1">
                    <label for="password" style="margin-top: 12px;">Password</label>
                    <input type="password" id="password" placeholder="Enter password" class="form-input" value="user1">
                    <div class="error-msg" id="error-msg">Invalid credentials. Use user1/user1 or admin/admin.</div>
                </div>

                <button class="btn btn-primary full-width" onclick="handleLogin()">Sign In</button>
                <p class="help-text" id="help-text">Testing Accounts:<br>Candidate: user1/user1 | Admin: admin/admin</p>
            </div>

            <div class="powered-by"><strong>DevScreen AI</strong></div>
        </div>
    </div>

    <script>
        let currentRole = 'candidate';
        
        function switchRole(role) {
            currentRole = role;
            document.getElementById('tab-candidate').classList.toggle('active', role === 'candidate');
            document.getElementById('tab-hr').classList.toggle('active', role === 'hr');
            
            if(role === 'candidate') {
                document.getElementById('username').value = 'user1';
                document.getElementById('password').value = 'user1';
            } else {
                document.getElementById('username').value = 'admin';
                document.getElementById('password').value = 'admin';
            }
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const success = login(u, p);
            
            if(!success) {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
        
        // Clear old sessions on login page load
        localStorage.removeItem('currentUser');
    </script>
</body>
</html>
